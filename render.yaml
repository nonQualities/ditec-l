services:
  - type: web
    name: ditec-attendance
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: TURSO_DATABASE_URL
        sync: false # set to libsql://<your-db>-<org>.turso.io in the Render dashboard
      - key: TURSO_AUTH_TOKEN
        sync: false # set to your `turso db tokens create` output in the Render dashboard
